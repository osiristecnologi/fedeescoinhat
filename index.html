<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoinHat Feeds 🚀</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">CoinHat</div>

  <div class="search-wrap">
    <input id="searchInput" placeholder="Buscar cripto... 🔍">
  </div>
</header>

<!-- TICKER -->
<div class="ticker-bar">
  <div class="ticker-inner" id="ticker">
    BTC ↑ +2.4% • ETH ↓ -1.1% • DOGE ↑ +5.2%
  </div>
</div>

<!-- GRID -->
<div class="meme-grid" id="grid">

  <div class="meme-card">
    <div>Bitcoin</div>
    <div class="meme-price pos">$65,000</div>
  </div>

  <div class="meme-card">
    <div>Ethereum</div>
    <div class="meme-price neg">$3,200</div>
  </div>

  <div class="meme-card">
    <div>Dogecoin</div>
    <div class="meme-price pos">$0.15</div>
  </div>

  <div class="meme-card">
    <div>Shiba Inu</div>
    <div class="meme-price pos">$0.00002</div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; inset:0; justify-content:center; align-items:center;">
  <div style="background:white; padding:20px; width:90%; max-width:300px;">
    <h3 id="modalTitle">Crypto</h3>
    <p id="modalPrice">$0</p>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
