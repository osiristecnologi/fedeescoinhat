<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinHat Feeds 🚀</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>

  <!-- MENU -->
  <div class="icon" onclick="toggleMenu()">☰</div>

  <!-- SEARCH -->
  <input id="searchInput" placeholder="Buscar contrato/token 🔍">

  <!-- LANG -->
  <div class="icon" onclick="toggleLang()">🌐</div>

</header>

<!-- MENU LATERAL -->
<div id="sidebar">

  <h3>📰 Notícias</h3>
  <div id="news">Carregando...</div>

</div>

<!-- LANG MENU -->
<div id="langBox">
  <div>🇧🇷 Português</div>
  <div>🇺🇸 English</div>
  <div>🇪🇸 Español</div>
  <div>🇯🇵 日本語</div>
  <div>🇨🇳 中文</div>
  <div>🇷🇺 Русский</div>
</div>

<!-- TOKENS -->
<div id="grid"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h3 id="tokenName"></h3>
    <p id="tokenPrice"></p>

    <a id="tokenSite" target="_blank">🌐 Site</a><br>
    <a id="tokenTwitter" target="_blank">🐦 Twitter</a><br>
    <a id="tokenTg" target="_blank">💬 Telegram</a>

    <div id="chart">📊 gráfico aqui</div>

    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
